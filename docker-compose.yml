version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      PORT: 4000
      JWT_SECRET: development-secret
      DATABASE_URL: postgresql://postgres:postgres@db:5432/greenmarket
    command: sh -c "npm ci && npm run api:dev"
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greenmarket
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d greenmarket']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
