name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint:ci

      - name: Test (unit + integration)
        run: npm test -- --runInBand --testPathIgnorePatterns='src/__tests__/snapshots' --forceExit

      - name: Test (snapshots)
        run: npm test -- --testPathPattern='src/__tests__/snapshots' --forceExit
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build
        run: npm run build

      - name: Check bundle size regression
        run: npm run build:check
        env:
          CI: true
        continue-on-error: true

      - name: Lighthouse CI
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          npx lhci autorun
