name: CD — Deploy to Firebase Hosting

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-flight deploy

permissions:
  contents: read

jobs:
  deployment-readiness:
    name: Check Deployment Secrets
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'workflow_run' &&
           github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.event == 'push' &&
           github.event.workflow_run.head_branch == 'main') }}
    outputs:
      supabase_ready: ${{ steps.check.outputs.supabase_ready }}
      firebase_ready: ${{ steps.check.outputs.firebase_ready }}
      firebase_auth_mode: ${{ steps.check.outputs.firebase_auth_mode }}
    steps:
      - name: Validate deployment secret availability
        id: check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_SERVICE_ACCOUNT_GREENMARKET_MARKETPLACE }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_DEPLOY_PROJECT_ID: ${{ secrets.FIREBASE_DEPLOY_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Supabase deploy secrets are missing. Edge-function deploy will be skipped."
            echo "supabase_ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "Supabase deploy secrets detected. Validating project access..."
            supabase_status_code="$(curl -sS -o /tmp/supabase-project-check.json -w '%{http_code}' \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF")"

            if [ "$supabase_status_code" = "200" ]; then
              echo "Supabase access token can access project $SUPABASE_PROJECT_REF."
              echo "supabase_ready=true" >> "$GITHUB_OUTPUT"
            else
              echo "Supabase access token cannot access project $SUPABASE_PROJECT_REF (HTTP $supabase_status_code). Edge-function deploy will be skipped."
              echo "supabase_ready=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ -z "$FIREBASE_DEPLOY_PROJECT_ID" ]; then
            echo "Firebase deploy secrets are missing. Hosting deploy will be skipped."
            echo "firebase_ready=false" >> "$GITHUB_OUTPUT"
            echo "firebase_auth_mode=none" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Firebase service account detected."
            echo "firebase_ready=true" >> "$GITHUB_OUTPUT"
            echo "firebase_auth_mode=service_account" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "Firebase token detected."
            echo "firebase_ready=true" >> "$GITHUB_OUTPUT"
            echo "firebase_auth_mode=token" >> "$GITHUB_OUTPUT"
          else
            echo "Firebase auth secret is missing. Hosting deploy will be skipped."
            echo "firebase_ready=false" >> "$GITHUB_OUTPUT"
            echo "firebase_auth_mode=none" >> "$GITHUB_OUTPUT"
          fi
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build the production bundle
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build for Production
    runs-on: ubuntu-latest
    needs: deployment-readiness
    env:
      # ── Frontend-safe public keys (VITE_ prefix is required by Vite to embed in the bundle) ──
      VITE_SUPABASE_URL:          ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY:     ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_RECAPTCHA_SITE_KEY:    ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
      VITE_SENTRY_DSN:            ${{ secrets.VITE_SENTRY_DSN }}
      VITE_GOOGLE_MAPS_KEY:       ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
      VITE_APP_NAME:              ${{ secrets.VITE_APP_NAME }}
      VITE_SUPPORT_EMAIL:         ${{ secrets.VITE_SUPPORT_EMAIL }}
      VITE_SUPPORT_PHONE:         ${{ secrets.VITE_SUPPORT_PHONE }}
      VITE_COMMISSION_RATE:       ${{ secrets.VITE_COMMISSION_RATE }}
      VITE_DELIVERY_BASE_FEE:     ${{ secrets.VITE_DELIVERY_BASE_FEE }}
      VITE_DELIVERY_PER_KM_FEE:   ${{ secrets.VITE_DELIVERY_PER_KM_FEE }}
      VITE_FIREBASE_API_KEY:      ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN:  ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID:   ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID:       ${{ secrets.VITE_FIREBASE_APP_ID }}
      # ── NOTE: Back-end-only secrets (RESEND_API_KEY, STRIPE_SECRET_KEY,
      #          PAYPAL_CLIENT_SECRET, TWILIO_*, SUPABASE_SERVICE_ROLE_KEY,
      #          ALLOWED_ORIGINS) MUST NOT appear here.
      #          Set them exclusively as Supabase Edge Function secrets:
      #            supabase secrets set KEY=value --project-ref <ref>
      # ──────────────────────────────────────────────────────────────────
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run deploy:check
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # 2a. Deploy Supabase Edge Functions — Tier 1: Critical (payment + auth/security)
  #     Fail-fast: if any critical function fails, deployment stops.
  # ──────────────────────────────────────────────────────────────────────────
  deploy-functions-critical:
    name: Deploy Critical — ${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: [deployment-readiness, build]
    if: ${{ needs.build.result == 'success' && needs.deployment-readiness.outputs.supabase_ready == 'true' }}
    strategy:
      fail-fast: true
      max-parallel: 5
      matrix:
        function:
          # ── Payment-critical ──
          - calculate-checkout-pricing
          - create-checkout-order
          - create-paypal-order
          - capture-paypal-order
          - confirm-order-payment
          - payment-status-write
          - register-payment-receipt
          - get-bank-details
          - confirm-bank-transfer
          - paypal-webhook
          - refund-paypal-payment
          - refund-payment
          - process-manual-refund
          - reconcile-paypal-payments
          - send-payout
          - process-vendor-payout
          - commission-cron
          - stripe-webhook
          - stripe-checkout
          - create-payment-intent
          # ── CMI payment ──
          - cmi-payment
          - create-cmi-session
          - verify-cmi-callback
          - refund-cmi-payment
          # ── Auth/security-critical ──
          - auth-admin-ops
          - create-user-with-role
          - secure-login
          - sync-role
          - request-phone-otp
          - verify-phone-otp
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy ${{ matrix.function }}
        run: |
          supabase functions deploy ${{ matrix.function }} \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # 2b. Deploy Supabase Edge Functions — Tier 2: Standard (delivery, communication, infrastructure)
  #     Fail-fast disabled: non-critical function failures do not block hosting deploy.
  # ──────────────────────────────────────────────────────────────────────────
  deploy-functions-standard:
    name: Deploy Standard — ${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: [deployment-readiness, build, deploy-functions-critical]
    if: ${{ always() && needs.build.result == 'success' && (needs.deploy-functions-critical.result == 'success' || needs.deploy-functions-critical.result == 'skipped') && needs.deployment-readiness.outputs.supabase_ready == 'true' }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        function:
          # ── Delivery ──
          - accept-delivery
          - reject-delivery
          - assign-driver
          - auto-assign-driver
          - mark-delivery-picked-up
          - mark-delivery-on-the-way
          - mark-delivery-delivered
          # ── Orders ──
          - accept-order
          - reject-order
          - public-order-tracking
          - redeem-coupon
          # ── Communication / Support ──
          - send-email
          - send-sms
          - create-support-ticket
          - award-loyalty-points
          # ── Infrastructure / Config ──
          - get-public-config
          - process-outbox
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy ${{ matrix.function }}
        run: |
          supabase functions deploy ${{ matrix.function }} \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy frontend to Firebase Hosting
  # ──────────────────────────────────────────────────────────────────────────
  deploy-hosting:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [deployment-readiness, build, deploy-functions-critical, deploy-functions-standard]
    if: ${{ always() && needs.build.result == 'success' && (needs.deploy-functions-critical.result == 'success' || needs.deploy-functions-critical.result == 'skipped') && (needs.deploy-functions-standard.result == 'success' || needs.deploy-functions-standard.result == 'skipped' || needs.deploy-functions-standard.result == 'failure') && needs.deployment-readiness.outputs.firebase_ready == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/download-artifact@v4
        with:
          name: dist-production
          path: dist/
      - name: Deploy to Firebase Hosting via service account
        if: ${{ needs.deployment-readiness.outputs.firebase_auth_mode == 'service_account' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:        ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_SERVICE_ACCOUNT_GREENMARKET_MARKETPLACE }}
          channelId:        live
          projectId:        ${{ secrets.FIREBASE_DEPLOY_PROJECT_ID }}
      - name: Setup Node for Firebase CLI deploy
        if: ${{ needs.deployment-readiness.outputs.firebase_auth_mode == 'token' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy to Firebase Hosting via token
        if: ${{ needs.deployment-readiness.outputs.firebase_auth_mode == 'token' }}
        run: npx firebase-tools deploy --only hosting --project "$FIREBASE_DEPLOY_PROJECT_ID" --non-interactive --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_DEPLOY_PROJECT_ID: ${{ secrets.FIREBASE_DEPLOY_PROJECT_ID }}
