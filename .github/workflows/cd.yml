name: CD — Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual trigger from GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  deployment-readiness:
    name: Check Deployment Secrets
    runs-on: ubuntu-latest
    outputs:
      supabase_ready: ${{ steps.check.outputs.supabase_ready }}
      firebase_ready: ${{ steps.check.outputs.firebase_ready }}
    steps:
      - name: Validate deployment secret availability
        id: check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Supabase deploy secrets are missing. Edge-function deploy will be skipped."
            echo "supabase_ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "Supabase deploy secrets detected."
            echo "supabase_ready=true" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ] || [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "Firebase deploy secrets are missing. Hosting deploy will be skipped."
            echo "firebase_ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "Firebase deploy secrets detected."
            echo "firebase_ready=true" >> "$GITHUB_OUTPUT"
          fi
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build the production bundle
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build for Production
    runs-on: ubuntu-latest
    needs: deployment-readiness
    env:
      VITE_SUPABASE_URL:          ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY:     ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_RECAPTCHA_SITE_KEY:    ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
      VITE_FIREBASE_API_KEY:      ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN:  ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID:   ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID:       ${{ secrets.VITE_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Deploy Supabase Edge Functions first
  # ──────────────────────────────────────────────────────────────────────────
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [deployment-readiness, build]
    if: ${{ needs.build.result == 'success' && needs.deployment-readiness.outputs.supabase_ready == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy auth-admin-ops function
        run: |
          supabase functions deploy auth-admin-ops \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy frontend to Firebase Hosting
  # ──────────────────────────────────────────────────────────────────────────
  deploy-hosting:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [deployment-readiness, build, deploy-functions]
    if: ${{ always() && needs.build.result == 'success' && (needs.deploy-functions.result == 'success' || needs.deploy-functions.result == 'skipped') && needs.deployment-readiness.outputs.firebase_ready == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-production
          path: dist/
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:        ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId:        live
          projectId:        ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
